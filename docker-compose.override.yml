# Loaded automatically by Docker Compose in local development.
# DO NOT copy this file to the server — production uses docker-compose.yml only.
#
# Exposes Postgres and Redis ports to the host so you can:
#   - Run the API with `dotnet run` outside Docker
#   - Connect with TablePlus, DBeaver, redis-cli, etc.
# Caddy is not started locally; the API is accessed directly on port 8080.

services:

  hydra.api:
    ports:
      - "8080:8080"

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  caddy:
    profiles:
      - production
